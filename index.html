<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ration Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main-container">

<div class="left-panel">
  <h1>🍚 Ration Tracker</h1>
  <p>Offline-First Distribution System</p>
  <div class="card-legend">
    <h3>Card Types</h3>
    <div class="legend-item apl">🟡 APL — Above Poverty Line</div>
    <div class="legend-item bpl">🔴 BPL — Below Poverty Line</div>
    <div class="legend-item ant">🟢 Antyodaya — Poorest of Poor</div>
  </div>
</div>

<div class="right-panel">

<form id="loginForm" class="form-box">
  <h2>Login</h2>
  <input type="text" id="loginUsername" placeholder="Username" required>
  <input type="password" id="loginPassword" placeholder="Password" required>
  <button type="submit">Login</button>
</form>

<form id="signupForm" class="form-box">
  <h2>Sign Up</h2>
  <input type="text" id="signupUsername" placeholder="Username" required>
  <input type="password" id="signupPassword" placeholder="Password" required>

  <select id="roleSelect" required>
    <option value="" disabled selected>Select Role</option>
    <option value="shopkeeper">Shopkeeper</option>
    <option value="admin">Admin</option>
  </select>

  <button type="submit">Create</button>
</form>

</div>
</div>

<script src="app.js" defer></script>
</body>
</html>
